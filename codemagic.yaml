# =============================================================================
# Board Game Catalog — CodeMagic CI/CD
# =============================================================================
#
# Builds Android (APK) and iOS (IPA) and distributes via Firebase App Distribution.
# Release notes are extracted from mobile/CHANGELOG.md (latest entry only).
#
# REQUIRED SECRETS — set these in CodeMagic → Teams → Global variables / secrets:
#
#   Group: firebase_credentials
#     FIREBASE_SERVICE_ACCOUNT   — GCP service account JSON (base64 encoded)
#     FIREBASE_ANDROID_APP_ID    — Android app ID from Firebase console
#     FIREBASE_IOS_APP_ID        — iOS app ID from Firebase console
#
#   Group: ios_signing
#     CM_CERTIFICATE             — iOS distribution certificate (base64 encoded .p12)
#     CM_CERTIFICATE_PASSWORD    — Certificate password
#     CM_PROVISIONING_PROFILE    — Ad Hoc provisioning profile (base64 encoded .mobileprovision)
#
#   Group: android_signing (add when ready)
#     CM_KEYSTORE                — Android keystore file (base64 encoded)
#     CM_KEYSTORE_PASSWORD       — Keystore password
#     CM_KEY_ALIAS               — Key alias
#     CM_KEY_PASSWORD            — Key password
#
# =============================================================================

workflows:

  # ── Android ─────────────────────────────────────────────────────────────────
  android-release:
    name: Android — Firebase Distribution
    max_build_duration: 60
    environment:
      flutter: stable
      android_signing:
        - keystore_reference
      groups:
        - firebase_credentials
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Extract release notes from CHANGELOG.md
        script: |
          awk '/^## \[/{if(found) exit; found=1; next} found' mobile/CHANGELOG.md \
            | sed '/^[[:space:]]*$/d' \
            > /tmp/release_notes.txt
          echo "--- release notes ---"
          cat /tmp/release_notes.txt

      - name: Get packages
        script: flutter pub get
        working_directory: mobile

      - name: Build APK
        script: |
          flutter build apk --release \
            --build-name=$PROJECT_BUILD_VERSION \
            --build-number=$BUILD_NUMBER
        working_directory: mobile

      - name: Distribute to Firebase App Distribution
        script: |
          echo $FIREBASE_SERVICE_ACCOUNT | base64 --decode > /tmp/firebase-sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json \
          firebase appdistribution:distribute \
            mobile/build/app/outputs/flutter-apk/app-release.apk \
            --app $FIREBASE_ANDROID_APP_ID \
            --groups testers \
            --release-notes-file /tmp/release_notes.txt

    artifacts:
      - mobile/build/app/outputs/flutter-apk/app-release.apk

  # ── iOS ──────────────────────────────────────────────────────────────────────
  ios-release:
    name: iOS — Firebase Distribution
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - firebase_credentials
        - ios_signing
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Extract release notes from CHANGELOG.md
        script: |
          awk '/^## \[/{if(found) exit; found=1; next} found' mobile/CHANGELOG.md \
            | sed '/^[[:space:]]*$/d' \
            > /tmp/release_notes.txt
          echo "--- release notes ---"
          cat /tmp/release_notes.txt

      - name: Install certificate and provisioning profile
        script: |
          # Install distribution certificate into a build keychain
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k ~/Library/Keychains/build.keychain \
            -P "$CM_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          security list-keychain -d user -s build.keychain

          # Install provisioning profile
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(security cms -D -i /tmp/profile.mobileprovision | plutil -extract UUID raw -)
          cp /tmp/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision

          # Write export options plist for ad-hoc manual signing
          cat > /tmp/export_options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.tendimensions.boardgamecatalog</key>
                  <string>$PROFILE_UUID</string>
              </dict>
          </dict>
          </plist>
          EOF

      - name: Get packages
        script: flutter pub get
        working_directory: mobile

      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-name=$PROJECT_BUILD_VERSION \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/tmp/export_options.plist
        working_directory: mobile

      - name: Distribute to Firebase App Distribution
        script: |
          echo $FIREBASE_SERVICE_ACCOUNT | base64 --decode > /tmp/firebase-sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json \
          firebase appdistribution:distribute \
            $(find mobile/build/ios/ipa -name '*.ipa') \
            --app $FIREBASE_IOS_APP_ID \
            --groups testers \
            --release-notes-file /tmp/release_notes.txt

    artifacts:
      - mobile/build/ios/ipa/*.ipa
