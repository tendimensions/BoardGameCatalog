# =============================================================================
# Board Game Catalog — CodeMagic CI/CD
# =============================================================================
#
# Builds Android (APK) and iOS (IPA) and distributes via Firebase App Distribution.
# Release notes are extracted from mobile/CHANGELOG.md (latest entry only).
#
# REQUIRED SECRETS — set these in CodeMagic → Teams → Global variables / secrets:
#
#   FIREBASE_TOKEN            — Firebase CI token  (firebase login:ci)
#   FIREBASE_ANDROID_APP_ID   — Android app ID from Firebase console
#   FIREBASE_IOS_APP_ID       — iOS app ID from Firebase console
#
#   CM_KEYSTORE               — Android keystore file (base64 encoded)
#   CM_KEYSTORE_PASSWORD      — Keystore password
#   CM_KEY_ALIAS              — Key alias
#   CM_KEY_PASSWORD           — Key password
#
#   APP_STORE_CONNECT_API_KEY_KEY_ID        — App Store Connect API key ID
#   APP_STORE_CONNECT_API_KEY_ISSUER_ID     — Issuer ID
#   APP_STORE_CONNECT_API_KEY_PRIVATE_KEY   — Private key (.p8 contents)
#
# =============================================================================

workflows:

  # ── Android ─────────────────────────────────────────────────────────────────
  android-release:
    name: Android — Firebase Distribution
    max_build_duration: 60
    environment:
      flutter: stable
      android_signing:
        - keystore_reference       # matches CM_KEYSTORE secret name in UI
      groups:
        - firebase_credentials
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Extract release notes from CHANGELOG.md
        script: |
          # Pull the most recent entry (everything between the first and second ## heading)
          # and write it to a file for the Firebase CLI --release-notes-file flag.
          awk '/^## \[/{if(found) exit; found=1; next} found' mobile/CHANGELOG.md \
            | sed '/^[[:space:]]*$/d' \
            > /tmp/release_notes.txt
          echo "--- release notes ---"
          cat /tmp/release_notes.txt

      - name: Get packages
        script: flutter pub get
        working_directory: mobile

      - name: Build APK
        script: |
          flutter build apk --release \
            --build-name=$PROJECT_BUILD_VERSION \
            --build-number=$BUILD_NUMBER
        working_directory: mobile

      - name: Distribute to Firebase App Distribution
        script: |
          firebase appdistribution:distribute \
            mobile/build/app/outputs/flutter-apk/app-release.apk \
            --app $FIREBASE_ANDROID_APP_ID \
            --groups testers \
            --release-notes-file /tmp/release_notes.txt \
            --token $FIREBASE_TOKEN

    artifacts:
      - mobile/build/app/outputs/flutter-apk/app-release.apk

  # ── iOS ──────────────────────────────────────────────────────────────────────
  ios-release:
    name: iOS — Firebase Distribution
    max_build_duration: 60
    environment:
      flutter: stable
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.tendimensions.boardgamecatalog
      groups:
        - firebase_credentials
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Extract release notes from CHANGELOG.md
        script: |
          awk '/^## \[/{if(found) exit; found=1; next} found' mobile/CHANGELOG.md \
            | sed '/^[[:space:]]*$/d' \
            > /tmp/release_notes.txt
          echo "--- release notes ---"
          cat /tmp/release_notes.txt

      - name: Get packages
        script: flutter pub get
        working_directory: mobile

      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-name=$PROJECT_BUILD_VERSION \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
        working_directory: mobile

      - name: Distribute to Firebase App Distribution
        script: |
          firebase appdistribution:distribute \
            $(find mobile/build/ios/ipa -name '*.ipa') \
            --app $FIREBASE_IOS_APP_ID \
            --groups testers \
            --release-notes-file /tmp/release_notes.txt \
            --token $FIREBASE_TOKEN

    artifacts:
      - mobile/build/ios/ipa/*.ipa
