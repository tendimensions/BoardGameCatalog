version: '3.8'

services:
  web:
    build: .
    container_name: boardgame_catalog
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - ENV=production
      - DB_PATH=/app/data/db.sqlite3
    restart: unless-stopped
